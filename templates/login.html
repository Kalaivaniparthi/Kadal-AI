<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OceanGuard - Admin Login</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
        body {
            background: linear-gradient(135deg, #0a1628 0%, #1a3a5c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 400px;
            overflow: hidden;
        }
        .login-header {
            background: var(--navy);
            color: white;
            padding: 32px 30px;
            text-align: center;
            border-bottom: 3px solid var(--accent);
        }
        .login-header h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
        .login-header h1 span { color: #5bc8f5; }
        .login-header p { font-size: 13px; opacity: 0.7; }
        .login-body { padding: 30px; }
        .input-group { margin-bottom: 18px; }
        .input-group label {
            display: block;
            margin-bottom: 7px;
            color: var(--navy);
            font-weight: 600;
            font-size: 13px;
        }
        .input-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            color: var(--text);
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(30,111,165,0.12);
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--navy);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s, transform 0.1s;
        }
        .login-btn:hover { background: var(--navy-lt); }
        .login-btn:active { transform: scale(0.98); }
        .back-link {
            text-align: center;
            margin-top: 18px;
        }
        .back-link a {
            color: var(--accent);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        .back-link a:hover { text-decoration: underline; }
        .demo-info {
            background: #f5f8fc;
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 8px;
            margin-top: 18px;
            text-align: center;
            font-size: 12px;
            color: var(--muted);
        }
        .demo-info code {
            background: #e8eef5;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            color: var(--navy);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🌊 Ocean<span>Guard</span></h1>
            <p>AI-Powered Marine Plastic Prevention</p>
            <p style="font-size: 11px; margin-top: 4px; opacity:0.5;">Admin Access Only</p>
        </div>
        <div class="login-body">
            <form method="POST">
                <div class="input-group">
                    <label>👤 Username</label>
                    <input type="text" name="username" placeholder="Enter username" required>
                </div>
                <div class="input-group">
                    <label>🔒 Password</label>
                    <input type="password" name="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="login-btn">🔐 Login to Dashboard</button>
            </form>
            <div class="back-link">
                <a href="/">← Back to Map View</a>
            </div>
            <div style="text-align:center;margin-top:12px;">
                <a href="/fisher-login" style="color:#27ae60;text-decoration:none;font-size:13px;font-weight:500;">🎣 Fisher Login →</a>
            </div>
            <div class="demo-info">
                <strong>📝 Demo Credentials</strong><br>
                Username: <code>admin</code> &nbsp; Password: <code>admin123</code>
            </div>
        </div>
    </div>
</body>
</html>
